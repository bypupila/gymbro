name: Security Regression Gate

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-regression-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security-regression:
    name: Security and Build Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Root audit (prod)
        run: npm audit --omit=dev

      - name: Root audit (full)
        run: npm audit

      - name: Install functions dependencies
        run: npm ci
        working-directory: functions

      - name: Functions audit
        run: npm audit
        working-directory: functions

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Firebase service regression tests
        run: npx playwright test tests/firebaseService.regression.spec.ts --project=chromium

  partner-consistency:
    name: Partner Data Consistency
    runs-on: ubuntu-latest
    needs: security-regression
    env:
      FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
      FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
      FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
      FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required secrets
        id: gate
        shell: bash
        run: |
          if [ -n "$FIREBASE_SERVICE_ACCOUNT_JSON" ] || { [ -n "$FIREBASE_PROJECT_ID" ] && [ -n "$FIREBASE_CLIENT_EMAIL" ] && [ -n "$FIREBASE_PRIVATE_KEY" ]; }; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Skipping partner consistency: missing Firebase admin secrets."
          fi

      - name: Setup Node
        if: ${{ steps.gate.outputs.run == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: ${{ steps.gate.outputs.run == 'true' }}
        run: npm ci

      - name: Prepare Firebase admin credentials
        if: ${{ steps.gate.outputs.run == 'true' }}
        shell: bash
        run: |
          if [ -n "${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}" ]; then
            {
              echo "FIREBASE_SERVICE_ACCOUNT_JSON<<EOF"
              echo "${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}"
              echo "EOF"
            } >> "$GITHUB_ENV"
          else
            json="$(jq -cn \
              --arg project_id "${{ secrets.FIREBASE_PROJECT_ID }}" \
              --arg client_email "${{ secrets.FIREBASE_CLIENT_EMAIL }}" \
              --arg private_key "${{ secrets.FIREBASE_PRIVATE_KEY }}" \
              '{type:"service_account", project_id:$project_id, client_email:$client_email, private_key:$private_key, token_uri:"https://oauth2.googleapis.com/token"}')"
            echo "FIREBASE_SERVICE_ACCOUNT_JSON=$json" >> "$GITHUB_ENV"
          fi

      - name: Partner consistency audit
        if: ${{ steps.gate.outputs.run == 'true' }}
        run: npm run admin:audit:partners
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ env.FIREBASE_SERVICE_ACCOUNT_JSON }}

  live-validation:
    name: Live Partner Flows
    runs-on: ubuntu-latest
    needs: security-regression
    env:
      FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
      FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
      FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
      FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
      GYMBRO_EMAIL: ${{ secrets.GYMBRO_EMAIL }}
      GYMBRO_PASSWORD: ${{ secrets.GYMBRO_PASSWORD }}
      GYMBRO_EMAIL_2: ${{ secrets.GYMBRO_EMAIL_2 }}
      GYMBRO_PASSWORD_2: ${{ secrets.GYMBRO_PASSWORD_2 }}
      GYMBRO_BASE_URL: ${{ secrets.GYMBRO_BASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required secrets
        id: gate
        shell: bash
        run: |
          has_live="false"
          if [ -n "$GYMBRO_EMAIL" ] && [ -n "$GYMBRO_PASSWORD" ] && [ -n "$GYMBRO_EMAIL_2" ] && [ -n "$GYMBRO_PASSWORD_2" ] && [ -n "$GYMBRO_BASE_URL" ]; then
            has_live="true"
          fi

          has_admin="false"
          if [ -n "$FIREBASE_SERVICE_ACCOUNT_JSON" ] || { [ -n "$FIREBASE_PROJECT_ID" ] && [ -n "$FIREBASE_CLIENT_EMAIL" ] && [ -n "$FIREBASE_PRIVATE_KEY" ]; }; then
            has_admin="true"
          fi

          if [ "$has_live" = "true" ] && [ "$has_admin" = "true" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Skipping live validation: missing live test or Firebase admin secrets."
          fi

      - name: Setup Node
        if: ${{ steps.gate.outputs.run == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: ${{ steps.gate.outputs.run == 'true' }}
        run: npm ci

      - name: Prepare Firebase admin credentials
        if: ${{ steps.gate.outputs.run == 'true' }}
        shell: bash
        run: |
          if [ -n "${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}" ]; then
            {
              echo "FIREBASE_SERVICE_ACCOUNT_JSON<<EOF"
              echo "${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}"
              echo "EOF"
            } >> "$GITHUB_ENV"
          else
            json="$(jq -cn \
              --arg project_id "${{ secrets.FIREBASE_PROJECT_ID }}" \
              --arg client_email "${{ secrets.FIREBASE_CLIENT_EMAIL }}" \
              --arg private_key "${{ secrets.FIREBASE_PRIVATE_KEY }}" \
              '{type:"service_account", project_id:$project_id, client_email:$client_email, private_key:$private_key, token_uri:"https://oauth2.googleapis.com/token"}')"
            echo "FIREBASE_SERVICE_ACCOUNT_JSON=$json" >> "$GITHUB_ENV"
          fi

      - name: Install Playwright browser
        if: ${{ steps.gate.outputs.run == 'true' }}
        run: npx playwright install --with-deps chromium

      - name: Live auth smoke
        if: ${{ steps.gate.outputs.run == 'true' }}
        run: npx playwright test tests/live-auth-smoke.spec.ts --project=chromium --workers=1
        env:
          GYMBRO_EMAIL: ${{ secrets.GYMBRO_EMAIL }}
          GYMBRO_PASSWORD: ${{ secrets.GYMBRO_PASSWORD }}
          GYMBRO_BASE_URL: ${{ secrets.GYMBRO_BASE_URL }}

      - name: Live partner unlink symmetry
        if: ${{ steps.gate.outputs.run == 'true' }}
        run: npx playwright test tests/partner-unlink-symmetry-live.spec.ts --project=chromium --workers=1
        env:
          GYMBRO_EMAIL: ${{ secrets.GYMBRO_EMAIL }}
          GYMBRO_PASSWORD: ${{ secrets.GYMBRO_PASSWORD }}
          GYMBRO_EMAIL_2: ${{ secrets.GYMBRO_EMAIL_2 }}
          GYMBRO_PASSWORD_2: ${{ secrets.GYMBRO_PASSWORD_2 }}
          GYMBRO_BASE_URL: ${{ secrets.GYMBRO_BASE_URL }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ env.FIREBASE_SERVICE_ACCOUNT_JSON }}

      - name: Live partner routine sync
        if: ${{ steps.gate.outputs.run == 'true' }}
        run: npx playwright test tests/partner-routine-sync-live.spec.ts --project=chromium --workers=1
        env:
          GYMBRO_EMAIL: ${{ secrets.GYMBRO_EMAIL }}
          GYMBRO_PASSWORD: ${{ secrets.GYMBRO_PASSWORD }}
          GYMBRO_EMAIL_2: ${{ secrets.GYMBRO_EMAIL_2 }}
          GYMBRO_PASSWORD_2: ${{ secrets.GYMBRO_PASSWORD_2 }}
          GYMBRO_BASE_URL: ${{ secrets.GYMBRO_BASE_URL }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ env.FIREBASE_SERVICE_ACCOUNT_JSON }}
