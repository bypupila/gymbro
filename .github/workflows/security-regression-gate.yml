name: Security Regression Gate

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-regression-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security-regression:
    name: Security and Build Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Root audit (prod)
        run: npm audit --omit=dev

      - name: Root audit (full)
        run: npm audit

      - name: Install functions dependencies
        run: npm ci
        working-directory: functions

      - name: Functions audit
        run: npm audit
        working-directory: functions

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Firebase service regression tests
        run: npx playwright test tests/firebaseService.regression.spec.ts --project=chromium

  partner-consistency:
    name: Partner Data Consistency
    runs-on: ubuntu-latest
    needs: security-regression
    if: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON != '' || (secrets.FIREBASE_PROJECT_ID != '' && secrets.FIREBASE_CLIENT_EMAIL != '' && secrets.FIREBASE_PRIVATE_KEY != '') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare Firebase admin credentials
        shell: bash
        run: |
          if [ -n "${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}" ]; then
            {
              echo "FIREBASE_SERVICE_ACCOUNT_JSON<<EOF"
              echo "${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}"
              echo "EOF"
            } >> "$GITHUB_ENV"
          else
            json="$(jq -cn \
              --arg project_id "${{ secrets.FIREBASE_PROJECT_ID }}" \
              --arg client_email "${{ secrets.FIREBASE_CLIENT_EMAIL }}" \
              --arg private_key "${{ secrets.FIREBASE_PRIVATE_KEY }}" \
              '{type:"service_account", project_id:$project_id, client_email:$client_email, private_key:$private_key, token_uri:"https://oauth2.googleapis.com/token"}')"
            echo "FIREBASE_SERVICE_ACCOUNT_JSON=$json" >> "$GITHUB_ENV"
          fi

      - name: Partner consistency audit
        run: npm run admin:audit:partners
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ env.FIREBASE_SERVICE_ACCOUNT_JSON }}

  live-validation:
    name: Live Partner Flows
    runs-on: ubuntu-latest
    needs: security-regression
    if: ${{ secrets.GYMBRO_EMAIL != '' && secrets.GYMBRO_PASSWORD != '' && secrets.GYMBRO_EMAIL_2 != '' && secrets.GYMBRO_PASSWORD_2 != '' && secrets.GYMBRO_BASE_URL != '' && (secrets.FIREBASE_SERVICE_ACCOUNT_JSON != '' || (secrets.FIREBASE_PROJECT_ID != '' && secrets.FIREBASE_CLIENT_EMAIL != '' && secrets.FIREBASE_PRIVATE_KEY != '')) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare Firebase admin credentials
        shell: bash
        run: |
          if [ -n "${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}" ]; then
            {
              echo "FIREBASE_SERVICE_ACCOUNT_JSON<<EOF"
              echo "${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}"
              echo "EOF"
            } >> "$GITHUB_ENV"
          else
            json="$(jq -cn \
              --arg project_id "${{ secrets.FIREBASE_PROJECT_ID }}" \
              --arg client_email "${{ secrets.FIREBASE_CLIENT_EMAIL }}" \
              --arg private_key "${{ secrets.FIREBASE_PRIVATE_KEY }}" \
              '{type:"service_account", project_id:$project_id, client_email:$client_email, private_key:$private_key, token_uri:"https://oauth2.googleapis.com/token"}')"
            echo "FIREBASE_SERVICE_ACCOUNT_JSON=$json" >> "$GITHUB_ENV"
          fi

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Live auth smoke
        run: npx playwright test tests/live-auth-smoke.spec.ts --project=chromium --workers=1
        env:
          GYMBRO_EMAIL: ${{ secrets.GYMBRO_EMAIL }}
          GYMBRO_PASSWORD: ${{ secrets.GYMBRO_PASSWORD }}
          GYMBRO_BASE_URL: ${{ secrets.GYMBRO_BASE_URL }}

      - name: Live partner unlink symmetry
        run: npx playwright test tests/partner-unlink-symmetry-live.spec.ts --project=chromium --workers=1
        env:
          GYMBRO_EMAIL: ${{ secrets.GYMBRO_EMAIL }}
          GYMBRO_PASSWORD: ${{ secrets.GYMBRO_PASSWORD }}
          GYMBRO_EMAIL_2: ${{ secrets.GYMBRO_EMAIL_2 }}
          GYMBRO_PASSWORD_2: ${{ secrets.GYMBRO_PASSWORD_2 }}
          GYMBRO_BASE_URL: ${{ secrets.GYMBRO_BASE_URL }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ env.FIREBASE_SERVICE_ACCOUNT_JSON }}

      - name: Live partner routine sync
        run: npx playwright test tests/partner-routine-sync-live.spec.ts --project=chromium --workers=1
        env:
          GYMBRO_EMAIL: ${{ secrets.GYMBRO_EMAIL }}
          GYMBRO_PASSWORD: ${{ secrets.GYMBRO_PASSWORD }}
          GYMBRO_EMAIL_2: ${{ secrets.GYMBRO_EMAIL_2 }}
          GYMBRO_PASSWORD_2: ${{ secrets.GYMBRO_PASSWORD_2 }}
          GYMBRO_BASE_URL: ${{ secrets.GYMBRO_BASE_URL }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ env.FIREBASE_SERVICE_ACCOUNT_JSON }}
