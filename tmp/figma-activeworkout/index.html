<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GymBro ActiveWorkout Card</title>
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
  <style>
    :root {
      --bg: #0A0A0B;
      --surface: #141416;
      --border: rgba(255, 255, 255, 0.08);
      --text: #FFFFFF;
      --text-secondary: #9CA3AF;
      --primary: #00E699;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      font-family: "Segoe UI", sans-serif;
      color: var(--text);
      padding: 24px;
    }
    .card {
      width: 470px;
      border: 1px solid var(--border);
      border-radius: 24px;
      overflow: hidden;
      background: var(--surface);
      box-shadow: 0 8px 30px rgba(0,0,0,.35);
    }
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px;
      min-height: 102px;
    }
    .thumb {
      width: 70px;
      height: 70px;
      border-radius: 12px;
      object-fit: cover;
      border: 1px solid var(--border);
      flex-shrink: 0;
      background: #1A1A1E;
    }
    .content { flex: 1; min-width: 0; }
    .title {
      margin: 0 0 2px 0;
      font-size: 18px;
      font-weight: 800;
      line-height: 1.2;
      color: var(--text);
    }
    .meta {
      margin: 0;
      font-size: 13px;
      line-height: 1.35;
      color: var(--text-secondary);
    }
    .actions {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-secondary);
      font-size: 18px;
    }
    .divider {
      width: 1px;
      height: 16px;
      background: var(--border);
      margin: 0 4px;
    }
    .badge-row {
      display: flex;
      gap: 8px;
      padding: 16px;
      border-top: 1px solid var(--border);
      background: linear-gradient(to bottom, rgba(255,255,255,.01), rgba(255,255,255,0));
    }
    .badge {
      height: 28px;
      border-radius: 999px;
      border: 1px solid rgba(0,230,153,.35);
      background: rgba(0,230,153,.12);
      color: var(--primary);
      font-size: 11px;
      font-weight: 700;
      padding: 0 11px;
      display: inline-flex;
      align-items: center;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <section class="card">
    <header class="header">
      <img class="thumb" src="https://images.unsplash.com/photo-1599058917765-a780eda07a3e?auto=format&fit=crop&w=300&q=80" alt="Ejercicio" />
      <div class="content">
        <h3 class="title">1. Press Banca Plano</h3>
        <p class="meta">4 series • 65 kg • 2.5 min</p>
      </div>
      <div class="actions" aria-hidden="true">
        <span>⇄</span>
        <div class="divider"></div>
        <span>⌃</span>
      </div>
    </header>
    <div class="badge-row">
      <span class="badge">Modo guiado</span>
      <span class="badge">Tiempo activo</span>
      <span class="badge">Sets editables</span>
    </div>
  </section>
</body>
</html>
